# Replication run: Qwen-2.5-7B-Instruct on the locked behavioral design.
#
# Reuses items + primes from runs/mve_llama8b/ (copied via scripts/bootstrap_replication.sh).
# This config exists to satisfy `configs/...yaml` as expected by the existing pipeline;
# the pre-reg in .context/preregistration.md is the authoritative design document.
#
# Stages 00-03 are SKIPPED for replication: items + primes are reused from the
# discovery run, and prime leak validation is model-independent (uses claude-opus-4-7
# as judge). Only stages 04 (run experiment) and 05 (analyze) are run here.
# Stage 01 (CAA vector build) is also skipped — caa_proj is not part of the
# pre-registered primary analysis and is out of scope for this branch.

run_name: replication_qwen7b
seed: 0
output_dir: runs

models:
  - name: qwen2_5_7b
    hf_id: Qwen/Qwen2.5-7B-Instruct
    dtype: bfloat16
    device_map: auto
    max_new_tokens: 32
    # Unused (caa_proj not in measures); kept to satisfy the schema.
    caa_layer: -12

# Item filter knobs (unused at run time — items_filtered.jsonl is copied in from the
# discovery run via bootstrap_replication.sh — but the schema requires them).
data:
  dataset: triviaqa
  split: validation
  n_items: 500
  oversample: 10
  single_entity_only: true
  baseline_acc_min: 0.2
  baseline_acc_max: 0.8
  baseline_acc_n_samples: 5
  seed: 0

# Prime knobs (unused — primes.jsonl is copied in — but kept to mirror the discovery config).
primes:
  generator_model: claude-opus-4-7
  judge_model: claude-opus-4-7
  max_leak_rate: 0.05
  max_sentences: 3
  counterbalance_order: false

# Unused (no CAA in this run); schema requires the block.
caa:
  n_contrast_pairs: 200
  read_position: post_newline

# All conditions are run for parity with the discovery set, but only the six
# primary conditions are used in the pre-registered analysis. illusory_tot and
# fluency_degradation results are reported under "secondary findings."
conditions:
  - baseline
  - cue_familiarity_priming
  - target_priming
  - partial_accessibility
  - illusory_tot
  - fluency_degradation
  - random_paragraph
  - whitespace

# caa_proj deliberately omitted — out of scope for the behavioral pre-reg.
# verbal_num kept for completeness but not part of primary analysis.
confidence_measures:
  - log_prob
  - verbal_cat
  - verbal_num
  - p_true
