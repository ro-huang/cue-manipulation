# Replication v2: extends the cross-model behavioral test to the four remaining models
# in the user's chosen suite (Llama-3.1-{70B}, Qwen-2.5-{72B}, Gemma-2-{9B, 27B}).
#
# Prior runs:
#   - runs/mve_llama8b/        : Llama-3.1-8B-Instruct  (discovery, bf16)
#   - runs/replication_qwen7b/ : Qwen-2.5-7B-Instruct   (replication v1, bf16)
#
# This config covers the four new models in a single parquet so the headline figure
# can overlay all six rows with one --run-dir argument set.
#
# PRECISION DEVIATION (logged in .context/preregistration.md §5):
#   - 9B and 27B models: bf16, identical to discovery.
#   - 70B and 72B models: int8 quantization, to fit on a single 80GB GPU. The
#     experiment is about effect direction (does the prime shift confidence?), and
#     int8 inference quality is well-established to preserve generation behavior at
#     this scale. Documented as a deviation; if the dissociation pattern hinges on
#     int8-vs-bf16 difference at the 70B scale, that's itself a finding.
#
# As with replication_qwen7b: items + primes are reused from runs/mve_llama8b/.
# Only stages 04 (experiment) + 05 (analyze) are run; CAA vector build is skipped
# since caa_proj is out of scope per the pre-registration.

run_name: replication_v2
seed: 0
output_dir: runs

models:
  # User dropped Gemma from this run (2026-04-26); Llama-70B + Qwen-72B only.

  - name: llama3_70b
    hf_id: meta-llama/Llama-3.1-70B-Instruct
    dtype: int4
    device_map: auto
    max_new_tokens: 32
    caa_layer: -20  # unused

  - name: qwen2_5_72b
    hf_id: Qwen/Qwen2.5-72B-Instruct
    dtype: int4
    device_map: auto
    max_new_tokens: 32
    caa_layer: -20  # unused

# Schema-required blocks (stages 00–03 are skipped; items + primes copied from mve_llama8b).
data:
  dataset: triviaqa
  split: validation
  n_items: 500
  oversample: 10
  single_entity_only: true
  baseline_acc_min: 0.2
  baseline_acc_max: 0.8
  baseline_acc_n_samples: 5
  seed: 0

primes:
  generator_model: claude-opus-4-7
  judge_model: claude-opus-4-7
  max_leak_rate: 0.05
  max_sentences: 3
  counterbalance_order: false

caa:
  n_contrast_pairs: 200
  read_position: post_newline

conditions:
  - baseline
  - cue_familiarity_priming
  - target_priming
  - partial_accessibility
  - illusory_tot
  - fluency_degradation
  - random_paragraph
  - whitespace

confidence_measures:
  - log_prob
  - verbal_cat
  - verbal_num
  - p_true
