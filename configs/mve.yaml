run_name: mve_llama8b
seed: 0
output_dir: runs

models:
  - name: llama3_8b
    hf_id: meta-llama/Llama-3.1-8B-Instruct
    dtype: bfloat16
    device_map: auto
    max_new_tokens: 32
    # Middle-upper layers carry confidence signal most cleanly per Kumaran et al.
    caa_layer: -12

data:
  dataset: triviaqa
  split: validation
  n_items: 500
  oversample: 10
  single_entity_only: true
  baseline_acc_min: 0.2
  baseline_acc_max: 0.8
  baseline_acc_n_samples: 5
  seed: 0

primes:
  generator_model: claude-opus-4-7
  judge_model: claude-opus-4-7
  max_leak_rate: 0.05
  max_sentences: 3
  counterbalance_order: false

caa:
  n_contrast_pairs: 200
  read_position: post_newline

# MVE: extended to the full Koriat condition matrix so we can distinguish
# cue-familiarity inflation specifically from any-prefix priming.
conditions:
  - baseline
  - cue_familiarity_priming
  - target_priming
  - partial_accessibility   # plausible-but-wrong topic-adjacent facts (Koriat 1993)
  - illusory_tot            # semantically adjacent dense-noun passage (Schwartz 1998)
  - fluency_degradation     # awkward synonym rephrase of the question
  - random_paragraph        # yoked length-matched neutral context (control)
  - whitespace              # content-free spaces, isolates "any prefix" effect

# MVE minimum is verbal + CAA; adding log_prob and verbal_num is effectively free
# (no extra model forward passes for log_prob, one extra short forward for verbal_num)
# and avoids the ceiling effect we saw on verbal_cat alone. p_true is a Kadavath-style
# self-elicitation channel that's distinct from log_prob (and not coupled to the
# CAA contrast); one extra forward pass per trial.
confidence_measures:
  - log_prob
  - verbal_cat
  - verbal_num
  - caa_proj
  - p_true
