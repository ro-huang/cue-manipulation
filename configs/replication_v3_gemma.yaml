# Replication v3 (Gemma): cross-family pair distinct from Llama / Qwen.
#
# Reuses items + primes from runs/mve_llama8b/ (same locked design as replication_qwen7b).
# Both models in bf16 — fits comfortably on a single 80GB GPU one after another.
#
# Hugging Face: accept the Gemma license at
#   https://huggingface.co/google/gemma-2-9b-it
#   https://huggingface.co/google/gemma-2-27b-it
# and set HF_TOKEN before stage 04.
#
# Run on a GPU pod:
#   bash scripts/run_replication_v3_gemma.sh
# Headline figure (needs matplotlib): run locally after rsync, e.g.
#   PYTHONPATH=src python scripts/10_headline_figure.py ... (see script comments)

run_name: replication_v3_gemma
seed: 0
output_dir: runs

models:
  - name: gemma2_9b
    hf_id: google/gemma-2-9b-it
    dtype: bfloat16
    device_map: auto
    max_new_tokens: 32
    caa_layer: -12

  - name: gemma2_27b
    hf_id: google/gemma-2-27b-it
    dtype: bfloat16
    device_map: auto
    max_new_tokens: 32
    caa_layer: -12

data:
  dataset: triviaqa
  split: validation
  n_items: 500
  oversample: 10
  single_entity_only: true
  baseline_acc_min: 0.2
  baseline_acc_max: 0.8
  baseline_acc_n_samples: 5
  seed: 0

primes:
  generator_model: claude-opus-4-7
  judge_model: claude-opus-4-7
  max_leak_rate: 0.05
  max_sentences: 3
  counterbalance_order: false

caa:
  n_contrast_pairs: 200
  read_position: post_newline

conditions:
  - baseline
  - cue_familiarity_priming
  - target_priming
  - partial_accessibility
  - illusory_tot
  - fluency_degradation
  - random_paragraph
  - whitespace

confidence_measures:
  - log_prob
  - verbal_cat
  - verbal_num
  - p_true
