run_name: full_design
seed: 0
output_dir: runs

models:
  - name: llama3_8b
    hf_id: meta-llama/Llama-3.1-8B-Instruct
    dtype: bfloat16
    caa_layer: -12
  - name: llama3_70b
    hf_id: meta-llama/Llama-3.1-70B-Instruct
    dtype: bfloat16
    caa_layer: -20
  - name: gemma3_4b
    hf_id: google/gemma-3-4b-it
    dtype: bfloat16
    caa_layer: -8
  - name: gemma3_27b
    hf_id: google/gemma-3-27b-it
    dtype: bfloat16
    caa_layer: -16

data:
  dataset: triviaqa
  split: validation
  n_items: 2000
  oversample: 10
  single_entity_only: true
  baseline_acc_min: 0.2
  baseline_acc_max: 0.8
  baseline_acc_n_samples: 5

primes:
  generator_model: claude-opus-4-7
  judge_model: claude-opus-4-7
  max_leak_rate: 0.05
  max_sentences: 3
  counterbalance_order: true

caa:
  n_contrast_pairs: 200
  read_position: post_newline

conditions:
  - baseline
  - cue_familiarity_priming
  - target_priming
  - partial_accessibility
  - illusory_tot
  - fluency_degradation
  - random_paragraph

confidence_measures:
  - log_prob
  - verbal_cat
  - verbal_num
  - caa_proj
  - p_true
